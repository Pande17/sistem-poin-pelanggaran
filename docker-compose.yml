services:
    app:
        build: ./backend
        platform: linux/amd64
        container_name: php-backend
        working_dir: /var/www/html
        volumes:
            - ./backend:/var/www/html
            # - ./backend/000-default.conf:/etc/apache2/sites-available/000-default.conf
        ports:
            - '8000:8000'
        environment:
            - TZ=Asia/Singapore
        depends_on:
            - db

    frontend:
        build: ./frontend
        platform: linux/amd64
        container_name: react-frontend
        working_dir: /app
        volumes:
            - ./frontend:/app
            - /app/node_modules
        ports:
            - '5173:5173'
        environment:
            - CHOKIDAR_USEPOLLING=true
            - TZ=Asia/Singapore
        command: npm run dev -- --host
    db:
        image: mysql:8.0
        platform: linux/amd64
        container_name: mysql_db
        restart: always
        environment:
            - MYSQL_ROOT_PASSWORD=root
            - MYSQL_DATABASE=poin_pelanggaran_siswa
            - TZ=Asia/Singapore
        command: --default-time-zone='+08:00'
        ports:
            - '3306:3306'
        volumes:
            - db_data:/var/lib/mysql

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        platform: linux/amd64
        container_name: phpmyadmin
        restart: always
        ports:
            - '8080:80'
        environment:
            - PMA_HOST=db
            - PMA_USER=root
            - PMA_PASSWORD=root
            - TZ=Asia/Singapore
        depends_on:
            - db

volumes:
    db_data:
